name: Build Sage Apptainer container

on:
  push:
    branches: [main]
    paths:
      - "code/**"
      - "container/**"
      - ".github/workflows/build-sage-container.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push the SIF to GHCR

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # The SageMath base image is large (several GB). Free up runner disk
      # so the Docker layer cache + SIF build don't run out of space.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Build SIF image
        run: |
          apptainer build sage-job.sif container/sage.def

      - name: Smoke-test the container
        run: |
          apptainer test sage-job.sif

      - name: Log in to GHCR
        run: |
          apptainer registry login \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            oras://ghcr.io

      - name: Push SIF to GHCR (ORAS)
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          apptainer push sage-job.sif oras://ghcr.io/${REPO_LC}/sage-job:latest
          apptainer push sage-job.sif oras://ghcr.io/${REPO_LC}/sage-job:${{ github.sha }}

      # Optional fallback: also attach the SIF as a workflow artifact
      # (useful if your cluster can't reach ghcr.io). Note the 90-day
      # default retention and per-artifact size considerations.
      - name: Upload SIF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-job-sif
          path: sage-job.sif
          retention-days: 14
